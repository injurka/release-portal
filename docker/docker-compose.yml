services:
  release-portal-client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: ${REGISTRY:-docker.io}/injurka/release-portal-client:${V_CLIENT:-latest}
    restart: unless-stopped
    networks:
      - trip-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.release-portal-client.rule=Host(`release-portal.trip-scheduler.ru`)"
      - "traefik.http.routers.release-portal-client.entrypoints=websecure"
      - "traefik.http.routers.release-portal-client.tls.certresolver=letsencrypt"
      - "traefik.http.services.release-portal-client.loadbalancer.server.port=3336"
      - "traefik.docker.network=trip-net"

  release-portal-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: ${REGISTRY:-docker.io}/injurka/release-portal-server:${V_SERVER:-latest}
    restart: unless-stopped
    environment:
      - PORT=4446
      - DB_PATH=/db/releases.sqlite
    volumes:
      - ./db:/db
    networks:
      - trip-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.release-portal-server.rule=Host(`release-portal-api.trip-scheduler.ru`)"
      - "traefik.http.routers.release-portal-server.entrypoints=websecure"
      - "traefik.http.routers.release-portal-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.release-portal-server.loadbalancer.server.port=4446"
      - "traefik.docker.network=trip-net"

networks:
  trip-net:
    external: true
    name: trip-net
